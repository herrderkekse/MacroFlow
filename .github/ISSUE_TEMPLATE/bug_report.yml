name: 🐛 Bug report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug"]

body:
  - type: textarea
    id: bug
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots if applicable

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: e.g. iPhone 6

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. iOS 8.1

  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: e.g. 22

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem