name: ✨ Enhancement request
description: Suggest an improvement to an existing feature
title: "[ENHANCE] "
labels: ["enhancement"]

body:
  - type: textarea
    id: problem
    attributes:
      label: Describe the problem
      description: What issue do you have with the current feature?
      placeholder: e.g. I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features?
    
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots