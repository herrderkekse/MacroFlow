name: 🚀 Feature request
description: Suggest a new idea for this project
title: "[FEAT] "
labels: ["feature request"]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: Is your feature request related to a problem?
      placeholder: e.g. I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots